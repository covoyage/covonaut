name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - path: "."
            name: root
          - path: "tools"
            name: tools
    name: build-and-test (${{ matrix.module.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: go vet
        working-directory: ${{ matrix.module.path }}
        run: go vet ./...

      - name: go build
        working-directory: ${{ matrix.module.path }}
        run: go build ./...

      - name: go test
        working-directory: ${{ matrix.module.path }}
        run: go test ./...
